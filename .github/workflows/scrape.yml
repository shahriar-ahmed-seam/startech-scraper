name: Star Tech Scraper

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Top-level category URL or name to scrape (leave empty for all)'
        required: false
        default: ''
      skip_images:
        description: 'Skip image downloads (faster cloud runs)'
        required: false
        default: 'true'
      limit:
        description: 'Max products to scrape (0 for unlimited)'
        required: false
        default: '0'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper (Hierarchical)
        run: |
          ARGS="--delay 1.2 --timeout 18000 --db startech.db"
          if [ -n "${{ github.event.inputs.category }}" ]; then
            ARGS="$ARGS --category \"${{ github.event.inputs.category }}\""
          fi
          if [ "${{ github.event.inputs.skip_images }}" = "true" ]; then
            ARGS="$ARGS --skip-images"
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          ARGS="$ARGS --limit ${LIMIT:-0}"
          echo "Running: python scraper.py $ARGS"
          eval python scraper.py $ARGS

      - name: Commit & Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add startech.db pics/ || true
          git commit -m "Scrape update: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Scraped Data
        run: |
          zip -r scraped_data.zip startech.db pics/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: scraped_data.zip
          retention-days: 90
