name: Star Tech Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          # Set timeout to 5 hours (18000 seconds) so it exits cleanly before the 6-hour limit
          python scraper.py --limit 0 --delay 1.2 --timeout 18000

      - name: Commit and Push Progress
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add startech.db pics/
          git commit -m "Save scraping progress from cloud runner [skip ci]" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Scraped Data
        run: |
          zip -r scraped_data.zip startech.db pics/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: scraped-data
          path: scraped_data.zip
          retention-days: 90
